{% extends "base.html" %}
{% block title %}Sign In — IP Protection System{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="col-md-5 col-lg-4">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
                <h2>Welcome back</h2>
                <p>Sign in to your secure IP vault</p>
            </div>
            <div class="auth-card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
                        Sign In Securely
                    </button>
                    <p class="text-center mb-0" style="font-size:0.85rem; color:var(--text-muted);">
                        No account? <a href="{{ url_for('signup') }}" style="color:var(--gold); text-decoration:none; font-weight:600;">Create one here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
